name: Keep Demo Alive

# Pings the live Render demo every day so the dashboard route runs a real
# database query against Supabase — this resets Supabase's 7-day inactivity
# timer and prevents the free-tier project from being auto-paused.

on:
  schedule:
    - cron: '0 3 * * *'   # daily at 03:00 UTC
  workflow_dispatch:        # allows manually triggering from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping live demo
        run: |
          curl -sSf --retry 3 --retry-delay 10 "https://YOUR-APP-NAME.onrender.com/" \
            && echo "Ping successful" \
            || echo "Ping failed — check if the Render service is still active"
